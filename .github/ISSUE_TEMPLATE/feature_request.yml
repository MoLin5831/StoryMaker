name: 功能建议
description: 提出产品、CLI、Dashboard 或开发体验改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述真实使用场景，而不只是解决方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明你希望 StoryMaker 如何表现。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你考虑过其他做法，也请一起写下。
  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 是否会影响 CLI、Dashboard、导出、索引、发布或兼容命名？
