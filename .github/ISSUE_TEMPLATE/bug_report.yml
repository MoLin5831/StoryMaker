name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 简要说明哪里不符合预期。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请写出从干净状态开始的操作步骤。
      placeholder: |
        1. 运行 ...
        2. 输入 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 可以贴出错误输出、日志片段或截图说明。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: StoryMaker 版本或 commit
      placeholder: 0.0.0 / commit hash
  - type: input
    id: node
    attributes:
      label: Node.js 与 pnpm 版本
      placeholder: node -v / pnpm -v
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Windows 11 / macOS / Ubuntu
