project:
  title: "Untitled Novella"
  content_type: "novella"
  workflow_profile: "standard"
  language: "zh-CN"
  target_words: 50000
  target_units: 20
  unit_name: "chapter"

writing:
  words_per_unit_min: 1800
  words_per_unit_max: 3000
  rolling_plan_units: 5
  review_frequency: "every_unit"
  output_dir: "outputs/chapters"
  output_format: "md"
  chapter_filename: "numbered_title"
  chapter_heading: "numbered_title"
  chapter_number_padding: 3

production:
  interaction_mode: "guided_auto"
  auto_produce_unit: true
  stop_after_unit_for_user_acceptance: true
  progress_visible: true

knowledge:
  wiki_required: true
  search_mode: "keyword"
  fact_extraction_required: true

quality:
  ai_taste_gate: "required"
  continuity_gate: "standard"

adapters:
  installed: []
  mcp:
    enabled: false
